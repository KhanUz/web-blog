<section class="space-y-8" data-page-name="editor">
  <header class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
    <div>
      <p class="eyebrow">Content editing</p>
      <h2 class="mt-3 text-4xl font-semibold tracking-[-0.04em] text-black">Blog details on top, writing workspace below</h2>
    </div>
    <div class="flex flex-wrap gap-2">
      <button class="nav-chip" type="button" hx-get="/fragments/actions/draft-saved.html" hx-target="#editor-feedback" hx-swap="innerHTML">Save draft</button>
      <button class="nav-chip" type="button" hx-get="/fragments/actions/article-published.html" hx-target="#editor-feedback" hx-swap="innerHTML">Publish</button>
    </div>
  </header>

  <section class="panel p-5 sm:p-6">
    <div class="border-b border-black/10 pb-4">
      <div>
        <p class="text-sm font-medium text-black">Article details</p>
        <p class="mt-1 text-sm text-stone-500">Keep the post metadata together before moving into the main writing area.</p>
      </div>
    </div>
    <div class="mt-5 grid gap-4 lg:grid-cols-2">
      <input class="w-full rounded-[1.2rem] border border-black/10 bg-stone-50 px-4 py-3 outline-none transition focus:border-black" type="text" value="Designing Calm Interfaces" placeholder="Article title" />
      <input class="w-full rounded-[1.2rem] border border-black/10 bg-stone-50 px-4 py-3 outline-none transition focus:border-black" type="text" value="designing-calm-interfaces" placeholder="Slug" />
      <input class="w-full rounded-[1.2rem] border border-black/10 bg-stone-50 px-4 py-3 outline-none transition focus:border-black" type="text" value="Interface, Editorial" placeholder="Categories" />
      <input class="w-full rounded-[1.2rem] border border-black/10 bg-stone-50 px-4 py-3 outline-none transition focus:border-black" type="text" value="design, markdown, preview" placeholder="Tags" />
      <textarea class="min-h-28 w-full rounded-[1.2rem] border border-black/10 bg-stone-50 px-4 py-3 leading-7 outline-none transition focus:border-black lg:col-span-2" placeholder="Summary">A note on reducing interface noise so the writing stays central.</textarea>
    </div>
  </section>

  <div class="grid gap-6 xl:grid-cols-2">
    <section class="panel p-5 sm:p-6">
      <div class="border-b border-black/10 pb-4">
        <div>
          <p class="text-sm font-medium text-black">Content editor</p>
          <p class="mt-1 text-sm text-stone-500">Write the main article body here.</p>
        </div>
      </div>
      <div class="mt-5">
        <textarea
          class="min-h-[28rem] w-full rounded-[1.5rem] border border-black/10 bg-stone-50 px-4 py-4 leading-7 outline-none transition focus:border-black"
          data-editor-input
        ></textarea>
      </div>
    </section>

    <section class="panel p-5 sm:p-6">
      <div class="border-b border-black/10 pb-4">
        <div>
          <p class="text-sm font-medium text-black">Preview</p>
          <p class="mt-1 text-sm text-stone-500">Rendered side by side with the editor on larger screens.</p>
        </div>
      </div>
      <article class="markdown-preview min-h-[28rem] pt-5" data-editor-preview></article>
    </section>
  </div>

  <div id="editor-feedback"></div>
</section>
