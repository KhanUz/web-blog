<section class="space-y-8" data-page-name="editor">
  <header class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
    <div>
      <p class="eyebrow">Content editing</p>
      <h2 class="mt-3 text-4xl font-semibold tracking-[-0.04em] text-black">Split editor with real-time markdown preview</h2>
    </div>
    <div class="flex flex-wrap gap-2">
      <button class="nav-chip" type="button" hx-get="/fragments/actions/draft-saved.html" hx-target="#editor-feedback" hx-swap="innerHTML">Save draft</button>
      <button class="nav-chip" type="button" hx-get="/fragments/actions/article-published.html" hx-target="#editor-feedback" hx-swap="innerHTML">Publish</button>
    </div>
  </header>

  <div class="grid gap-6 xl:grid-cols-2">
    <section class="panel p-5 sm:p-6">
      <div class="flex items-center justify-between border-b border-black/10 pb-4">
        <div>
          <p class="text-sm font-medium text-black">Editor</p>
          <p class="mt-1 text-sm text-stone-500">Left side for writing, right side for reading.</p>
        </div>
      </div>
      <div class="mt-5 space-y-4">
        <input class="w-full rounded-[1.2rem] border border-black/10 bg-stone-50 px-4 py-3 outline-none transition focus:border-black" type="text" value="Designing Calm Interfaces" />
        <textarea
          class="min-h-[28rem] w-full rounded-[1.5rem] border border-black/10 bg-stone-50 px-4 py-4 leading-7 outline-none transition focus:border-black"
          data-editor-input
        ></textarea>
      </div>
    </section>

    <section class="panel p-5 sm:p-6">
      <div class="flex items-center justify-between border-b border-black/10 pb-4">
        <div>
          <p class="text-sm font-medium text-black">Preview</p>
          <p class="mt-1 text-sm text-stone-500">Rendered as the article would read.</p>
        </div>
      </div>
      <article class="markdown-preview min-h-[28rem] pt-5" data-editor-preview></article>
    </section>
  </div>

  <div id="editor-feedback"></div>
</section>
