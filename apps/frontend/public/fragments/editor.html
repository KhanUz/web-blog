<section class="space-y-8" data-page-name="editor">
  <header class="page-header">
    <div>
      <p class="eyebrow">Content editing</p>
      <h2 class="page-title">Blog details on top, writing workspace below</h2>
    </div>
    <div class="flex flex-wrap gap-2">
      <button class="nav-chip" type="button" hx-get="/fragments/actions/draft-saved.html" hx-target="#editor-feedback" hx-swap="innerHTML">Save draft</button>
      <button class="nav-chip" type="button" hx-get="/fragments/actions/article-published.html" hx-target="#editor-feedback" hx-swap="innerHTML">Publish</button>
    </div>
  </header>

  <section class="panel p-5 sm:p-6">
    <header class="panel-head-compact">
      <p class="text-sm font-medium text-black">Article details</p>
      <p class="body-text mt-1">Keep the post metadata together before moving into the main writing area.</p>
    </header>
    <div class="mt-5 grid gap-4 lg:grid-cols-2">
      <input class="field-input" type="text" value="Designing Calm Interfaces" placeholder="Article title" />
      <input class="field-input" type="text" value="designing-calm-interfaces" placeholder="Slug" />
      <input class="field-input" type="text" value="Interface, Editorial" placeholder="Categories" />
      <input class="field-input" type="text" value="design, markdown, preview" placeholder="Tags" />
      <textarea class="field-textarea lg:col-span-2" placeholder="Summary">A note on reducing interface noise so the writing stays central.</textarea>
    </div>
  </section>

  <div class="grid gap-6 xl:grid-cols-2" data-editor-shell>
    <section class="panel p-5 sm:p-6">
      <header class="panel-head-compact">
        <p class="text-sm font-medium text-black">Content editor</p>
        <p class="body-text mt-1">Write the main article body here.</p>
      </header>
      <div class="mt-5">
        <textarea
          class="editor-textarea field-textarea min-h-[28rem] rounded-[1.5rem] py-4"
          data-editor-input
        ></textarea>
      </div>
    </section>

    <section class="panel p-5 sm:p-6">
      <header class="panel-head-compact">
        <p class="text-sm font-medium text-black">Preview</p>
        <p class="body-text mt-1">Rendered side by side with the editor on larger screens.</p>
      </header>
      <article class="markdown-preview min-h-[28rem] pt-5" data-editor-preview></article>
    </section>
  </div>

  <div id="editor-feedback"></div>
</section>
